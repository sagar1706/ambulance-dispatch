# ─────────────────────────────────────────────────────────────────
# docker-compose.yml
#
# Docker Compose starts MULTIPLE containers together with one command.
# Here we start TWO services:
#   1. "api"      → your Node.js server (from Dockerfile)
#   2. "postgres" → a PostgreSQL database (official image, no setup needed)
#
# WHY USE COMPOSE:
#   Without compose, you'd need to manually start each container,
#   create networks so they can talk to each other, and manage volumes
#   for data persistence. Compose does all of this automatically.
#
# COMMANDS:
#   docker-compose up --build     # build images + start all services
#   docker-compose up -d          # start in background (detached)
#   docker-compose down           # stop and remove containers
#   docker-compose down -v        # also delete the database data volume
#   docker-compose logs -f api    # follow logs for the api service
#   docker-compose exec api sh    # open a shell inside the api container
# ─────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Service 1: PostgreSQL Database ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ambulance_db
    environment:
      POSTGRES_DB: ambulance_system
      POSTGRES_USER: ambulance_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aishwarya}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ambulance_user -d ambulance_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Service 2: Redis (dispatch queue + caching) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: ambulance_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Persist data so queue jobs survive container restarts
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Service 3: Node.js API ──────────────────────────────────────
  api:
    build: .
    container_name: ambulance_api
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://ambulance_user:${DB_PASSWORD:-aishwarya}@postgres:5432/ambulance_system
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      # Redis — "redis" is resolved by Docker's internal DNS to the redis container
      REDIS_URL: redis://redis:6379
      QUEUE_RETRY_DELAY_MS: ${QUEUE_RETRY_DELAY_MS:-30000}
      QUEUE_MAX_ATTEMPTS: ${QUEUE_MAX_ATTEMPTS:-20}
      # Rate limiting
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-10}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-900000}
      REGISTER_RATE_LIMIT_MAX: ${REGISTER_RATE_LIMIT_MAX:-20}
      GLOBAL_RATE_LIMIT_MAX: ${GLOBAL_RATE_LIMIT_MAX:-200}
      # SMTP (optional — leave blank to log to console)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      # DB pool
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      LOG_TO_FILE: "true"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

# ── Named Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

